

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-verif
    restart: unless-stopped
    volumes:
      - /home/simeon/VerifCompil/ollama_data:/root/.ollama
    networks:
      - verif_compil
    # rappel futur : ne jamais exposé ses types de ports car gpu peut être utilisé 
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # frontend (React.js propulse par Node)
  web:
    build: ./site
    container_name: frontend-verif_compil
    restart: unless-stopped
    env_file:
      - config/env/.env
    volumes:
      - ./site/:/app
      - /app/node_modules
    depends_on:
      - pythonserver
    networks:
      - verif_compil

  # backend (Python IA & Compilateur)
  pythonserver:
    build: ./serveurPython
    container_name: backend-verif_compil
    restart: unless-stopped
    env_file:
      - config/env/.env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - '5000:5000'
    depends_on:
      - ollama
    networks:
      - verif_compil

  # Routeur Nginx
  nginx-proxy:
    image: 'nginx:stable-alpine'
    container_name: nginx-proxy-verif_compil
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    
    depends_on:
      - web
      - pythonserver
    networks:
      - verif_compil

networks:
  verif_compil:
    driver: bridge
