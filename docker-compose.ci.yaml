services:
  db:
    image: postgres:16-alpine
    container_name: bdd-verif-ci
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: verif_bdd

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-verif-ci
   

  pythonserver:
    build: ./serveurPython
    container_name: backend-verif-ci
    environment:
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_NAME=verif_bdd
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - ollama

  
  web:
    build: ./site
    container_name: frontend-verif-ci
    depends_on:
      - pythonserver

  nginx-proxy:
    image: nginx:stable-alpine
    container_name: nginx-proxy-ci
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - pythonserver