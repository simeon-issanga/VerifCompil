services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-verif
    networks:
      - verif_compil

  web:
    build: ./site
    container_name: serveur-verif_compil
    networks:
      - verif_compil

  pythonserver:
    build: ./serveurPython
    container_name: pythonserver-verif_compil
    env_file:
      - config/env/.env
    networks:
      - verif_compil

  nginx-proxy:
    image: 'nginx:stable-alpine'
    container_name: nginx-proxy-1
    ports:
      - '8080:80'
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - pythonserver
    networks:
      - verif_compil

networks:
  verif_compil:
    driver: bridge

volumes:
  ollama_data: