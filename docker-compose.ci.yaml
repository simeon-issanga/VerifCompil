services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: verif_bdd
   

  pythonserver:
    build: ./serveurPython
    environment:
      - DB_USER=admin
      - DB_PASSWORD=password123
      - DB_NAME=verif_bdd
      - PYTHONUNBUFFERED=1
    depends_on:
      - db


  web:
    build: ./site
    depends_on:
      - pythonserver

  nginx-proxy:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - pythonserver