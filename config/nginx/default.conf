server {
    listen 80;

    # Si l'URL commence par /api on envoie Python
    location /api/ {
        proxy_pass http://pythonserver:5000/;
        proxy_set_header Host $host;
    }

    # afficher site
    location / {
        proxy_pass http://web:5173;
        proxy_set_header Host $host;
        # MaJ React en direct
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
