name: CI-VerifCompil         

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]                  

jobs:
  verification-projet:        
    runs-on: ubuntu-latest   

    steps:                      
      - name: Recup fichier
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dependances Python
        run: |
          pip install requests flask openai 
      - name: Test de la fonction de compilation (Clang)
        run: |
          sudo apt-get install -y clang
          python3 tests/testClang.py

      - name: Vérification syntaxe Backend
        run: |
          cd serveurPython
          python3 -m py_compile app.py 
          - name: Afficher les logs en cas d'échec
          
            if: failure() # Ne s'exécute que si le test au-dessus a raté à supp
            run: |
              docker compose ps
              docker compose logs pythonserver
              docker compose logs nginx-proxy
      
      - name: Préparer faux .env 
        # pour que Docker Compose pas d'erreur
        run: |
          mkdir -p config/env
          echo "API_KEY_DEEPSEEK=fake_key_for_ci" > config/env/.env

      - name: Lancer les conteneurs pour test
        run: docker compose up -d

      - name: Attendre que le serveur soit prêt
        run: sleep 15 # docker pret

      - name: tests des fonctions back
        run: python3 tests/testCompil.py
        env:
          TEST_SERVER_URL: http://localhost:8080

      - name: Arrêter les conteneurs
        run: docker compose down

      - name: Build Frontend (React)
        run: |
          cd site
          npm install
          npm run build

      - name: Resultat
        run: echo " CI terminée"
